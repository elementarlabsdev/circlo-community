name: Build and Deploy to Docker Hub

on:
  push:
    branches:
      - main
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Sync version and tag
        id: versioning
        run: |
          # Get current version from app/package.json
          VERSION=$(node -p "require('./app/package.json').version")
          echo "Current version: $VERSION"

          # Increment version (patch) for new build
          npm version patch --no-git-tag-version --prefix app
          NEW_VERSION=$(node -p "require('./app/package.json').version")

          # Synchronize version in api/package.json
          npm version $NEW_VERSION --no-git-tag-version --prefix api

          echo "New version: $NEW_VERSION"
          echo "tag=$NEW_VERSION" >> $GITHUB_OUTPUT

          # Configure git for version change commit
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add app/package.json api/package.json
          git commit -m "chore: bump version to $NEW_VERSION [skip ci]" || echo "No changes to commit"
          git push origin HEAD:${{ github.ref_name }}

      - name: Run deploy script
        run: |
          chmod +x ./deploy-dockerhub.sh
          ./deploy-dockerhub.sh ${{ steps.versioning.outputs.tag }}

@switch (fieldData().type) {
  @case ('published') {
    <div class="bg-primary-500 text-white inline-flex rounded-full
                h-7 px-2 text-xs items-center">{{ fieldData().name }}</div>
  }
  @case ('draft') {
    <div class="inline-flex rounded-full h-7 px-2 text-xs items-center bg-surface-container-high text-on-surface">{{ fieldData().name }}</div>
  }
}

<app-login-guard>
  <div class="flex gap-3">
    <ngs-dicebear [image]="profile()?.avatarUrl | imageProxy: '100x100,sc,q90'"
                  [key]="profile()?.id" class="size-9"/>
    <ngs-comment-editor #editor [imageUploadFn]="imageUploadFn" [fullViewMode]="isReply()"
                        [placeholder]="'editor.placeholder' | transloco"
                        [cancelButtonAlwaysVisible]="isReply()"
                        [buttonSendLabel]="'editor.buttonSendLabel' | transloco"
                        [buttonCancelLabel]="'editor.buttonCancelLabel' | transloco"
                        (canceled)="onCanceled()" (sent)="onSent($event)"
                        class="border border-border grow rounded-2xl">
      <ngs-comment-editor-toolbar>
        <button ngsIconButton [ngsTooltip]="'editor.bold' | transloco"
                ngsCommentEditorCommand ngsCommentEditorCommandBold><ngs-icon name="fluent:text-bold-24-regular"/></button>
        <button ngsIconButton [ngsTooltip]="'editor.italic' | transloco"
                ngsCommentEditorCommand ngsCommentEditorCommandItalic><ngs-icon name="fluent:text-italic-24-regular"/></button>
        <button ngsIconButton [ngsTooltip]="'editor.strike' | transloco"
                ngsCommentEditorCommand ngsCommentEditorCommandStrike><ngs-icon name="fluent:text-strikethrough-24-regular"/></button>
        <ngs-comment-editor-divider/>
        <button ngsIconButton [ngsTooltip]="'editor.bulletList' | transloco"
                ngsCommentEditorCommand ngsCommentEditorCommandBulletList><ngs-icon name="fluent:list-24-regular"/></button>
        <button ngsIconButton [ngsTooltip]="'editor.orderedList' | transloco"
                ngsCommentEditorCommand ngsCommentEditorCommandOrderedList><ngs-icon name="fluent:text-number-list-24-regular"/></button>
        <button ngsIconButton [ngsTooltip]="'editor.blockquote' | transloco"
                ngsCommentEditorCommand ngsCommentEditorCommandBlockquote><ngs-icon name="fluent:text-quote-24-regular"/></button>
        <button ngsIconButton [ngsTooltip]="'editor.codeBlock' | transloco"
                ngsCommentEditorCommand ngsCommentEditorCommandCodeBlock><ngs-icon name="fluent:code-24-regular"/></button>
        <ngs-comment-editor-divider/>
        <button ngsIconButton [ngsTooltip]="'editor.uploadImage' | transloco"
                ngsCommentEditorCommand ngsCommentEditorCommandImage><ngs-icon name="fluent:image-24-regular"/></button>
        <button ngsIconButton [ngsTooltip]="'editor.addYoutube' | transloco"
                ngsCommentEditorCommand ngsCommentEditorCommandYoutube><ngs-icon name="fluent:video-24-regular"/></button>
      </ngs-comment-editor-toolbar>
      <ngs-comment-editor-bubble-menu>
        <button ngsCommentEditorCommandEditLink>
          <ngs-icon name="fluent:edit-24-regular"/>
        </button>
        <button ngsCommentEditorCommandUnsetLink>
          <ngs-icon name="fluent:link-dismiss-24-regular"/>
        </button>
        <button ngsCommentEditorCommand ngsCommentEditorCommandLink>
          <ngs-icon name="fluent:link-24-regular"/>
        </button>
        <button ngsCommentEditorCommand ngsCommentEditorCommandBold>
          <ngs-icon name="fluent:text-bold-24-regular"/>
        </button>
        <button ngsCommentEditorCommand ngsCommentEditorCommandItalic>
          <ngs-icon name="fluent:text-italic-24-regular"/>
        </button>
        <button ngsCommentEditorCommand ngsCommentEditorCommandStrike>
          <ngs-icon name="fluent:text-strikethrough-24-regular"/>
        </button>
        <button ngsCommentEditorCommand ngsCommentEditorCommandCode>
          <ngs-icon name="fluent:code-24-regular"/>
        </button>
      </ngs-comment-editor-bubble-menu>
      <ngs-comment-editor-footer-bar>
        @if (editor.api.isEditorActivated()) {
          <button ngsIconButton [ngsTooltip]="'editor.toggleToolbar' | transloco"
                  ngsCommentEditorCommand ngsCommentEditorCommandToggleToolbar><ngs-icon name="fluent:window-24-regular"/></button>
        }
      </ngs-comment-editor-footer-bar>
    </ngs-comment-editor>
  </div>
</app-login-guard>

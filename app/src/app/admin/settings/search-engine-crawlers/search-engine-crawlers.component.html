@if (loaded()) {
  <ngs-panel>
    <ngs-panel-header class="h-16 ps-16 pe-6 lg:px-6 border-b border-b-border">
      <div class="flex h-full items-center justify-between">
        <h1 class="font-bold">{{ 'admin.settings.search-engine-crawlers-heading' | transloco }}</h1>
        <button ngsButton="filled" (click)="save()">{{ 'common.save' | transloco }}</button>
      </div>
    </ngs-panel-header>
    <ngs-panel-content>
      <ngs-scrollbar-area>
        <div class="p-6 xl:p-12">
          <form [formGroup]="form" class="xl:w-8/12 mb-4">
            <div class="space-y-5">
              <ngs-form-field class="w-full">
                <ngs-label>{{ 'admin.settings.searchEngine.robots' | transloco }}</ngs-label>
                <textarea type="text" ngsInput rows="5" ngsTextareaAutoSize formControlName="robotsTxtContent"></textarea>
              </ngs-form-field>
            </div>
          </form>
        </div>
      </ngs-scrollbar-area>
    </ngs-panel-content>
  </ngs-panel>
} @else {
  <div class="p-6 xl:p-12">{{ 'common.loading' | transloco }}</div>
}

<ngs-panel>
  <ngs-panel-header class="h-16 ps-16 pe-6 lg:px-6 border-b border-b-border">
    <div class="flex h-full items-center justify-between">
      <h1 class="font-bold">{{ 'title.settings.meta-tags' | transloco }}</h1>
      <div class="flex gap-2">
        <button ngsButton="filled"
                type="submit"
                (click)="save()"
                [loading]="saving()"
                [disabled]="form.invalid || saving() || metaTags.length === 0">
          {{ 'button.save' | transloco }}
        </button>
      </div>
    </div>
  </ngs-panel-header>
  <ngs-panel-content>
    <ngs-scrollbar-area>
      <div class="p-12">
        @if (loading()) {
          Loading...
        } @else {
          <form [formGroup]="form" (ngSubmit)="save()">
            <div formArrayName="metaTags" class="flex flex-col gap-6">
              @for (tag of metaTags.controls; track $index) {
                <div [formGroupName]="$index" class="flex items-center gap-5 p-5 border border-border rounded-2xl relative group">
                  <div class="flex-1">
                    @if (tag.get('type')?.value === 'name') {
                      <ngs-form-field subscriptHiddenIfEmpty>
                        <ngs-label>{{ 'label.name' | transloco }}</ngs-label>
                        <input ngsInput formControlName="name" placeholder="description, keywords" />
                      </ngs-form-field>
                    } @else {
                      <ngs-form-field subscriptHiddenIfEmpty>
                        <ngs-label>{{ 'label.property' | transloco }}</ngs-label>
                        <input ngsInput formControlName="property" placeholder="og:title, twitter:card" />
                      </ngs-form-field>
                    }
                  </div>

                  <div class="flex-2">
                    <ngs-form-field subscriptHiddenIfEmpty>
                      <ngs-label>{{ 'label.content' | transloco }}</ngs-label>
                      <input ngsInput formControlName="content" placeholder="content" />
                    </ngs-form-field>
                  </div>

                  <div class="flex items-center">
                    <button ngsIconButton type="button" (click)="removeTag($index)" [title]="'button.remove' | transloco">
                      <ngs-icon name="fluent:delete-24-regular"/>
                    </button>
                  </div>
                </div>
              }
            </div>
          </form>

          <div class="mt-6">
            <button ngsButton="filled" type="button" [ngsMenuTriggerFor]="addMenu">
              <ngs-icon name="fluent:add-24-regular"/>
              {{ 'button.add' | transloco }}
            </button>

            <ngs-menu #addMenu="ngsMenu">
              <button ngs-menu-item (click)="addTag({ type: 'name' })">
                {{ 'label.name' | transloco }}
              </button>
              <button ngs-menu-item (click)="addTag({ type: 'property' })">
                {{ 'label.property' | transloco }}
              </button>
            </ngs-menu>
          </div>
        }
      </div>
    </ngs-scrollbar-area>
  </ngs-panel-content>
</ngs-panel>

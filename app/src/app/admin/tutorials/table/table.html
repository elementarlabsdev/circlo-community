<ngs-panel>
  <ngs-panel-header class="h-16 px-6 border-b border-b-border">
    <div class="flex h-full items-center justify-between">
      <div class="flex items-center gap-5">
        <h1 class="font-bold">{{ 'admin.tutorials.title' | transloco }}</h1>
      </div>
    </div>
  </ngs-panel-header>
  <ngs-panel-content>
    <ngs-data-view
      #datagridRef
      [columnDefs]="columnDefs"
      [cellRenderers]="cellRenderers"
      [withPagination]="true"
      [datasource]="datasource"
      rowModelType="serverSide"
      autoHeight
      withSelection
      withColumnSettings
      class="absolute inset-0"
      emptyFilterResultsIcon="fluent:compass-northwest-24-regular"
      emptyFilterResultsText="There are no tutorials yet."/>
  </ngs-panel-content>
</ngs-panel>

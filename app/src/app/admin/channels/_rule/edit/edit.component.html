<h2 ngs-dialog-title>Edit channel rule</h2>
<ngs-dialog-content [formGroup]="form">
  <div class="flex flex-col gap-3 pt-3">
    <ngs-form-field class="w-full">
      <ngs-label>Name</ngs-label>
      <input ngsInput formControlName="name" />
    </ngs-form-field>
    <ngs-form-field class="w-full">
      <ngs-label>Description</ngs-label>
      <textarea ngsInput formControlName="description" ngsTextareaAutoSize></textarea>
    </ngs-form-field>
  </div>
</ngs-dialog-content>
<ngs-dialog-actions>
  <button ngsButton (click)="cancel()">Cancel</button>
  <button ngsButton="filled" (click)="apply()" [disabled]="form.invalid">Apply</button>
</ngs-dialog-actions>

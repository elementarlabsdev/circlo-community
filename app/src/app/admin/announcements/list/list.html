<ngs-panel>
  <ngs-panel-header autoHeight>
    <ngs-toolbar class="h-16 px-6 border-b border-b-border">
      <ngs-toolbar-title>{{ 'announcements.announcements' | transloco }}</ngs-toolbar-title>
      <ngs-toolbar-spacer/>
      <button ngsButton="filled" (click)="createNew()">
        <ngs-icon name="fluent:add-24-regular"/>
        {{ 'announcements.newAnnouncement' | transloco }}
      </button>
    </ngs-toolbar>
  </ngs-panel-header>
  <ngs-panel-content>
    <ngs-data-view
      #datagridRef
      [columnDefs]="columnDefs"
      [cellRenderers]="cellRenderers"
      [withPagination]="true"
      [datasource]="datasource"
      autoHeight
      rowModelType="serverSide"
      withSelection
      withColumnSettings
      class="absolute inset-0"
      [emptyFilterResultsIcon]="'fluent:flash-24-regular'"
      [emptyFilterResultsText]="'announcements.noAnnouncements' | transloco"/>
  </ngs-panel-content>
</ngs-panel>

<ngs-panel>
  <ngs-panel-header class="h-16 px-6 border-b border-b-border">
    <div class="flex h-full items-center justify-between">
      <h1 class="font-bold">{{ 'admin.sidebar.complaints' | transloco }}</h1>
    </div>
  </ngs-panel-header>
  <ngs-panel-content>
    <ngs-data-view
      #datagridRef
      [columnDefs]="columnDefs"
      [cellRenderers]="cellRenderers"
      [withPagination]="true"
      [datasource]="datasource"
      rowModelType="serverSide"
      autoHeight
      withSelection
      withColumnSettings
      class="absolute inset-0"
      emptyFilterResultsIcon="fluent:shield-error-24-regular"
      [emptyFilterResultsText]="'admin.complaints.noComplaints' | transloco"/>
  </ngs-panel-content>
</ngs-panel>

<div class="flex flex-col items-center justify-center min-h-screen p-10 bg-surface-container-low font-sans text-on-surface">
  <div class="text-center mb-8">
    <h1 class="text-3xl font-bold mb-2 text-on-background">
      {{ 'checkout.cancelTitle' | transloco }}
    </h1>
    <p class="text-lg text-on-surface-variant">
      {{ 'checkout.cancelMessage' | transloco }}
    </p>
  </div>

  <div class="max-w-[560px] w-full p-10 bg-surface rounded-3xl shadow-sm border border-border">
    <div class="flex flex-col items-center text-center">
      <div class="w-20 h-20 mb-6 bg-error/10 text-error rounded-2xl flex items-center justify-center text-4xl">
        <span>❌</span>
      </div>

      <h2 class="text-2xl font-bold mb-2 text-on-surface">Payment Cancelled</h2>
      <p class="text-on-surface-variant mb-8">
        Your payment process was interrupted. No charges were made to your account.
      </p>

      <ngs-divider class="w-full my-6"/>

      <div class="w-full">
        <a routerLink="/checkout"
           class="block w-full py-4 px-6 rounded-2xl bg-primary text-on-primary font-bold text-lg text-center shadow-lg shadow-primary/20 hover:translate-y-[-2px] hover:shadow-xl active:translate-y-0 transition-all duration-200">
          {{ 'checkout.tryAgain' | transloco }}
        </a>
      </div>
    </div>

    <div class="mt-10 flex items-center justify-center gap-2 text-sm text-on-surface-variant font-medium opacity-70">
      <span class="text-lg">🛡</span>
      <span>Secure Transaction Canceled</span>
    </div>
  </div>
</div>

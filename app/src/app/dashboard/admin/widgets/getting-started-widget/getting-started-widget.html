<section class="bg-surface-container h-full p-6 rounded-3xl">
  <header
    class="flex items-center justify-between cursor-pointer">
    <div class="font-semibold">{{ 'admin.dashboard.widgets.gettingStarted.title' | transloco }}</div>
  </header>

  <div class="grid grid-cols-1 gap-5 mt-6 md:grid-cols-2">
    @for (item of items(); track item.title) {
      <div class="flex items-center px-4 py-4.5 gap-x-4
                  bg-surface-container-lowest rounded-2xl transition-shadow hover:shadow-sm">
        <div class="flex-shrink-0 relative -top-1.5">
          <ngs-icon [name]="item.icon"/>
        </div>

        <div class="flex-grow">
          <h3 class="font-semibold">{{ item.title }}</h3>
          <a [routerLink]="item.link" class="text-tiny mt-0.5 text-primary hover:underline">
            {{ item.subtitle }}
          </a>
        </div>

        <a [routerLink]="item.link"
           class="flex-shrink-0 transition-all duration-200 opacity-75 cursor-pointer
                  hover:opacity-100" ngsIconButton>
          <ngs-icon name="fluent:arrow-right-24-regular"/>
        </a>
      </div>
    }
  </div>
</section>

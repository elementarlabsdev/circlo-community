@if (loaded()) {
  <ngs-card class="h-full !bg-surface-container-lowest">
    <ngs-card-content>
      <div class="flex items-center justify-between">
        <div>
          <h3 class="tracking-tight font-semibold">Reactions</h3>
          <div class="pt-0 flex items-center mt-3 gap-3">
            <div class="text-3xl font-semibold flex gap-1">
              {{ data().reactionsCount || 0 }}
            </div>
          </div>
        </div>
        <div class="bg-red-50 rounded-xl size-20 flex items-center justify-center text-red-500">
          <ngs-icon name="fluent:heart-24-regular" />
        </div>
      </div>
    </ngs-card-content>
  </ngs-card>
}

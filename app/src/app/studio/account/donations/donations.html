<ngs-panel>
  <ngs-panel-header class="h-16 px-6 border-b border-b-border">
    <div class="flex h-full items-center justify-between gap-3">
      <h1 class="font-bold">{{ 'myProfile.heading.donations' | transloco }}</h1>
      <div class="flex items-center gap-3">
        <button ngsButton="filled" type="submit" form="donationsForm"
                [disabled]="form.invalid">{{ 'save' | transloco }}</button>
      </div>
    </div>
  </ngs-panel-header>
  <ngs-panel-content>
    <ngs-scrollbar-area>
      <div class="p-12">
        @if (loaded()) {
          <form id="donationsForm" (ngSubmit)="submit()" [formGroup]="form" class="space-y-6 w-2/3">
            <div formArrayName="urls"
                 cdkDropList
                 [cdkDropListData]="urls.controls"
                 cdkDropListOrientation="vertical"
                 (cdkDropListDropped)="drop($event)"
                 class="space-y-5">
              @for (ctrl of urls.controls; let i = $index; track ctrl) {
                <div class="flex items-center gap-4" [formGroupName]="i" cdkDrag [cdkDragData]="ctrl">
                  <div class="drag cursor-move text-xl" cdkDragHandle>⣿</div>
                  <div class="flex-1 grid grid-cols-1 gap-3">
                    <ngs-form-field subscriptHiddenIfEmpty>
                      <ngs-label>URL</ngs-label>
                      <input ngsInput formControlName="url" placeholder="https://..." />
                    </ngs-form-field>
                  </div>
                  <div class="item-actions">
                    <button ngsButton type="button" (click)="remove(items()[i], i)">
                      <ngs-icon name="fluent:delete-24-regular"/><span>Delete</span>
                    </button>
                  </div>
                </div>
              }
            </div>
          </form>
          <div [class.mt-7]="urls.controls.length > 0">
            <button ngsButton="outlined" type="button" (click)="add()">{{ 'add-donation-link' | transloco }}</button>
          </div>
        } @else {
          <div class="p-16">Loading…</div>
        }
      </div>
    </ngs-scrollbar-area>
  </ngs-panel-content>
</ngs-panel>

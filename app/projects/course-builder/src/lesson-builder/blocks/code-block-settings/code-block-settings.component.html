<div class="py-5" [formGroup]="form">
  <ngs-form-field class="w-full">
    <ngs-label>Language</ngs-label>
    <ngs-select formControlName="language">
      <ngs-option value="none">None</ngs-option>
      @for (language of languages() | orderBy:'name'; track language) {
        <ngs-option [value]="language.language">{{ language.name }}</ngs-option>
      }
    </ngs-select>
  </ngs-form-field>
</div>

<ngs-text-editor #editor
                 [content]="block().data.content"
                 (contentChange)="onContentChange($event)">
  <ngs-text-editor-floating-menu>
    <button ngsButton ngsTooltip="Bold"
            ngsTextEditorCommand ngsTextEditorCommandBold>
      <ngs-icon name="fluent:text-bold-24-regular"/>
    </button>
    <button ngsButton ngsTooltip="Italic"
            ngsTextEditorCommand ngsTextEditorCommandItalic>
      <ngs-icon name="fluent:text-italic-24-regular"/>
    </button>
    <button ngsButton ngsTooltip="Strike"
            ngsTextEditorCommand ngsTextEditorCommandStrike>
      <ngs-icon name="fluent:text-strikethrough-24-regular"/>
    </button>
    <ngs-text-editor-divider/>
    <button ngsButton ngsTooltip="Blockquote"
            ngsTextEditorCommand ngsTextEditorCommandBlockquote>
      <ngs-icon name="fluent:text-quote-24-regular"/>
    </button>
    <button ngsButton ngsTooltip="Horizontal Rule"
            ngsTextEditorCommand ngsTextEditorCommandHorizontalRule>
      <ngs-icon name="fluent:subtract-24-regular"/>
    </button>
  </ngs-text-editor-floating-menu>
  <ngs-text-editor-bubble-menu>
    <button ngsTextEditorCommandEditLink>
      <ngs-icon name="fluent:edit-24-regular"/>
    </button>
    <button ngsTextEditorCommandUnsetLink>
      <ngs-icon name="fluent:link-24-regular_off"/>
    </button>
    <button ngsTextEditorCommand ngsTextEditorCommandLink>
      <ngs-icon name="fluent:link-24-regular"/>
    </button>
    <button ngsTextEditorCommand ngsTextEditorCommandBold>
      <ngs-icon name="fluent:text-bold-24-regular"/>
    </button>
    <button ngsTextEditorCommand ngsTextEditorCommandItalic>
      <ngs-icon name="fluent:text-italic-24-regular"/>
    </button>
    <button ngsTextEditorCommand ngsTextEditorCommandStrike>
      <ngs-icon name="fluent:text-strikethrough-24-regular"/>
    </button>
    <button ngsTextEditorCommand ngsTextEditorCommandCode>
      <ngs-icon name="fluent:code-24-regular"/>
    </button>
  </ngs-text-editor-bubble-menu>
</ngs-text-editor>

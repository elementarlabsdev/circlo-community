<div class="py-5" [formGroup]="form">
  <ngs-form-field class="w-full">
    <ngs-label>Alt text</ngs-label>
    <input ngsInput formControlName="alt">
  </ngs-form-field>
  <ngs-form-field class="w-full">
    <ngs-label>Align</ngs-label>
    <ngs-select formControlName="align">
      <ngs-option value="left">Left</ngs-option>
      <ngs-option value="center">Center</ngs-option>
      <ngs-option value="right">Right</ngs-option>
    </ngs-select>
  </ngs-form-field>
</div>

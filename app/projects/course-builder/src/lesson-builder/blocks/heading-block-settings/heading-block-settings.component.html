<div class="py-5" [formGroup]="form">
  <ngs-form-field class="w-full">
    <ngs-label>Level</ngs-label>
    <ngs-select formControlName="level">
      <ngs-option [value]="1">H1</ngs-option>
      <ngs-option [value]="2">H2</ngs-option>
      <ngs-option [value]="3">H3</ngs-option>
      <ngs-option [value]="4">H4</ngs-option>
      <ngs-option [value]="5">H5</ngs-option>
      <ngs-option [value]="6">H6</ngs-option>
    </ngs-select>
  </ngs-form-field>
</div>

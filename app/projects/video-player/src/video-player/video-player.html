<div class="video-container group w-full h-full bg-black relative" [class.is-playing]="isPlaying()" (click)="togglePlay()">
  <video #videoElement class="w-full h-full object-contain relative z-[1]" [class.hidden]="!loaded()"></video>

  @if (!loaded()) {
    <div class="skeleton absolute inset-0 w-full h-full bg-[linear-gradient(90deg,#1e1e1e_25%,#2a2a2a_50%,#1e1e1e_75%)] bg-[length:200%_100%] animate-[skeleton-loading_1.5s_infinite] z-0 pointer-events-none"></div>
  }

  <div class="controls-overlay absolute inset-0 w-full h-full flex flex-col bg-black/30 transition-all duration-300 z-[3] pointer-events-auto"
       [class.opacity-0]="isPlaying()"
       [class.invisible]="isPlaying()"
       [class.pointer-events-none]="isPlaying()"
       [class.group-hover:opacity-100]="true"
       [class.group-hover:visible]="true"
       [class.group-hover:pointer-events-auto]="true">
    <div class="center-controls flex-1 flex justify-center items-center pointer-events-none absolute inset-0" (click)="togglePlay()">
      <button class="play-button w-[120px] h-[120px] rounded-full bg-red-500 backdrop-blur-[4px] text-white flex justify-center items-center cursor-pointer transition-[transform,background-color] duration-200 pointer-events-auto hover:scale-110 hover:bg-red-600 active:scale-95"
              (click)="togglePlay(); $event.stopPropagation()">
        @if (isPlaying()) {
          <ngs-icon name="fluent:pause-24-filled" class="text-[52px] w-[52px] h-[52px]" />
        } @else {
          <ngs-icon name="fluent:play-24-filled" class="text-[52px] w-[52px] h-[52px]" />
        }
      </button>
    </div>
  </div>

  @if (hasStarted()) {
    <div class="bottom-controls min-h-[80px] p-4 pb-2 flex items-center bg-gradient-to-t from-black/70 to-transparent gap-2 absolute bottom-0 left-0 right-0 invisible opacity-0 translate-y-2 transition-all duration-300 z-[4] pointer-events-none group-hover:visible group-hover:opacity-100 group-hover:translate-y-0 group-hover:pointer-events-auto"
         (click)="$event.stopPropagation()">
      <div class="seek-bar-container flex-grow w-full h-10 flex items-center">
        <ngs-slider min="0" [max]="duration()" step="0.1" class="!w-full [&.ngs-mdc-slider]:[--mdc-slider-active-track-color:var(--color-primary)] [&.ngs-mdc-slider]:[--mdc-slider-inactive-track-color:rgba(255,255,255,0.3)] [&.ngs-mdc-slider]:[--mdc-slider-handle-color:var(--color-primary)] [&.ngs-mdc-slider]:[--mdc-slider-hover-handle-color:var(--color-primary)] [&.ngs-mdc-slider]:[--mdc-slider-focus-handle-color:var(--color-primary)]">
          <input ngsSliderThumb [value]="currentTime()" (input)="seek($event)">
        </ngs-slider>
      </div>
      <div class="actions flex-none flex items-center h-12">
        <div class="flex-1"></div>
        <button ngsIconButton (click)="toggleMute()">
          @if (isMuted() || volume() === 0) {
            <ngs-icon name="fluent:speaker-off-24-regular" class="text-white"/>
          } @else {
            <ngs-icon name="fluent:speaker-2-24-regular" class="text-white"/>
          }
        </button>
        <button ngsIconButton (click)="toggleFullscreen()">
          @if (isFullscreen()) {
            <ngs-icon name="fluent:full-screen-minimize-24-regular" class="text-white"/>
          } @else {
            <ngs-icon name="fluent:full-screen-maximize-24-regular" class="text-white"/>
          }
        </button>
      </div>
    </div>
  }
</div>

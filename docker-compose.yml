services:
  redis:
    image: redis:alpine
    container_name: "redis"
    command: /bin/sh -c "redis-server --requirepass \"$$REDIS_PASSWORD\""
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    volumes:
      - "./data/redis:/data"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "$REDIS_PASSWORD", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - circlo

  imageproxy:
    image: willnorris/imageproxy
    environment:
      IMAGEPROXY_CACHE: "redis://:$REDIS_PASSWORD@redis:6379"
      IMAGEPROXY_BASEURL: "https://$DOMAIN"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - circlo
    extra_hosts:
      - "${DOMAIN}:host-gateway"

  database:
    image: timescale/timescaledb-ha:pg17
    restart: always
    container_name: database
    environment:
      - POSTGRES_DB=${POSTGRES_DB:?POSTGRES_DB is required}
      - POSTGRES_USER=${POSTGRES_USER:?POSTGRES_USER is required}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - circlo

  cap:
    image: tiago2/cap:2.2.1
    container_name: cap
    environment:
      - ADMIN_KEY=${CAP_ADMIN_KEY:?CAP_ADMIN_KEY is required}
      - SERVER_PORT=3001
      - ENABLE_ASSETS_SERVER=true
      - REDIS_URL=${REDIS_URL:?REDIS_URL is required}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./data/cap:/usr/src/app/.data
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/3001'"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - circlo

  api:
    container_name: api
    build:
      context: .
      dockerfile: .docker/api/Dockerfile
    image: api
    restart: always
    volumes:
      - ./data/public:/app/public
    environment:
      ENV: ${ENV:-prod}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      BACKEND_URL: https://${DOMAIN:?DOMAIN is required}
      BACKEND_DOMAIN: $DOMAIN
      FRONTEND_URL: https://$DOMAIN
      DOMAIN: $DOMAIN
      BACKEND_HOST_URL: https://$DOMAIN
      HOST_URL: https://$DOMAIN
      IMAGE_PROXY_URL: https://img.$DOMAIN
      LOCAL_FILE_STORAGE_BASE_URL: ${LOCAL_FILE_STORAGE_BASE_URL:-https://$DOMAIN}
      NOTIFICATIONS_AGGREGATION_WINDOW_MS: ${NOTIFICATIONS_AGGREGATION_WINDOW_MS:-300000}
      LOCALE: ${LOCALE:-en}
      REDIS_URL: ${REDIS_URL:?REDIS_URL is required}
      CAPTCHA_HOST_URL: https://captcha.$DOMAIN
      CAP_ADMIN_KEY: ${CAP_ADMIN_KEY:?CAP_ADMIN_KEY is required}
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
      cap:
        condition: service_healthy
    networks:
      - circlo
    extra_hosts:
      - "${DOMAIN}:host-gateway"
      - "captcha.${DOMAIN}:host-gateway"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:3000/api/v1/initialize" ]
      interval: 10s
      timeout: 5s
      retries: 5

  webserver:
    image: caddy:2.7-alpine
    container_name: webserver
    restart: always
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./data/caddy_data:/data
      - ./data/caddy_config:/config
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: $DOMAIN
      CERT_MAIL: $CERT_MAIL
    depends_on:
      app:
        condition: service_started
      api:
        condition: service_healthy
      imageproxy:
        condition: service_started
    networks:
      - circlo

  app:
    container_name: app
    image: app
    restart: always
    build:
      context: .
      dockerfile: .docker/app/Dockerfile
    environment:
      LOCALE: $LOCALE
      APP_API_URL: https://$DOMAIN/api/v1/
      WEBSOCKET_URL: https://ws.$DOMAIN
      DOMAIN: $DOMAIN
      BASE_URL: https://$DOMAIN
    depends_on:
      api:
        condition: service_healthy
      imageproxy:
        condition: service_started
    networks:
      - circlo
    extra_hosts:
      - "${DOMAIN}:host-gateway"
      - "ws.${DOMAIN}:host-gateway"

networks:
  circlo:
    driver: bridge
